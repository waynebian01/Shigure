<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 320" role="img" aria-labelledby="title desc">
  <title id="title">Shigure logo</title>
  <desc id="desc">A dark futuristic sidearm silhouette with a cool backlight and the Shigure wordmark.</desc>
  <defs>
    <radialGradient id="halo" cx="42%" cy="42%" r="58%">
      <stop offset="0" stop-color="#f2f7f6" stop-opacity=".9"/>
      <stop offset=".34" stop-color="#6b7d87" stop-opacity=".38"/>
      <stop offset=".72" stop-color="#0f1720" stop-opacity=".26"/>
      <stop offset="1" stop-color="#020405" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f3942"/>
      <stop offset=".42" stop-color="#151b22"/>
      <stop offset="1" stop-color="#070b10"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d7e1e8" stop-opacity=".86"/>
      <stop offset=".38" stop-color="#5f717d" stop-opacity=".6"/>
      <stop offset="1" stop-color="#15202a" stop-opacity=".2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#84f3e7"/>
      <stop offset="1" stop-color="#2b7f90"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .34 0 0 0 0 .9 0 0 0 0 .86 0 0 0 .32 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="320" rx="28" fill="#030608"/>
  <ellipse cx="418" cy="116" rx="286" ry="190" fill="url(#halo)"/>
  <path d="M64 260C164 122 290 56 462 62c171 6 329 64 498 30v168H64z" fill="#07100f" opacity=".42"/>

  <g transform="translate(162 50)" filter="url(#softGlow)">
    <path d="M42 52h36l8 18-10 17H45L25 75V62z" fill="url(#steel)" stroke="#8b98a2" stroke-width="3" stroke-linejoin="round"/>
    <path d="M78 58h265l43 25 146 2 12 18-11 17-157 4-31 23H132l-24-21H69l13-30z" fill="url(#steel)" stroke="#8895a1" stroke-width="3" stroke-linejoin="round"/>
    <path d="M323 83h72l41 12 105 2" fill="none" stroke="url(#edge)" stroke-width="6" stroke-linecap="round"/>
    <path d="M114 72h160" stroke="#d8e3e9" stroke-opacity=".52" stroke-width="5" stroke-linecap="round"/>
    <path d="M137 96h95" stroke="#67d9cf" stroke-opacity=".62" stroke-width="4" stroke-linecap="round"/>
    <path d="M258 123l37 16-58 90c-5 8-16 11-25 7l-22-10 46-96z" fill="#0a0f15" stroke="#71808a" stroke-width="3" stroke-linejoin="round"/>
    <path d="M335 131l42 11-18 92c-2 10-12 16-22 13l-35-10z" fill="#060a0f" stroke="#71808a" stroke-width="3" stroke-linejoin="round"/>
    <path d="M188 130l32 8-21 69c-3 10-12 16-22 14l-37-7 20-86z" fill="#091016" stroke="#71808a" stroke-width="3" stroke-linejoin="round"/>
    <path d="M402 77l132-3 34 28-34 26-130-5 16-21z" fill="#0b1117" stroke="#71808a" stroke-width="3" stroke-linejoin="round"/>
    <path d="M535 76h70l24 19v22h-64l-30-23z" fill="#060a0d" stroke="#71808a" stroke-width="3" stroke-linejoin="round"/>
    <path d="M271 124c16 22 41 25 61 5" fill="none" stroke="#97a5ae" stroke-width="4" stroke-linecap="round"/>
    <path d="M87 86h28m38-8h96m106 43h58" stroke="#05080b" stroke-width="7" stroke-linecap="round" opacity=".72"/>
    <circle cx="88" cy="71" r="9" fill="#05080b" stroke="#9ba7b1" stroke-width="3"/>
    <circle cx="318" cy="102" r="10" fill="#05080b" stroke="#9ba7b1" stroke-width="3"/>
    <path d="M54 125h42" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g transform="translate(110 236)">
    <path d="M0 0h360" stroke="#84f3e7" stroke-opacity=".35" stroke-width="3" stroke-linecap="round"/>
    <path d="M0 14h218" stroke="#d8e3e9" stroke-opacity=".16" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g transform="translate(688 104)">
    <text x="0" y="58" fill="#eef6f6" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="5">SHIGURE</text>
    <text x="4" y="94" fill="#84f3e7" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="6">STATE ASSIST UI</text>
    <path d="M4 115h216" stroke="#84f3e7" stroke-opacity=".58" stroke-width="3" stroke-linecap="round"/>
